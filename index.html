<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cine-Search Pro</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-shell">
<header class="header">
<h1 class="logo">Cine-Search<span>Pro</span></h1>
<input type="text" id="searchInput" placeholder="Search Movie..." autocomplete="off" />
<div class="search-status" id="searchStatus">
Promise.allSettled · 0/0 resolved
</div>
</header>

<main class="dashboard">
<section class="results-panel" id="resultsPanel" data-loading="false">
<div class="loading-spinner hidden" id="loadingSpinner"></div>

<ul id="resultsList"></ul>
</section>

<section class="movie-panel details-panel" id="movieDetails">
<div class="detail-empty" id="detail-empty">
<div class="detail-empty-icon"></div>
<p>SEARCH A FILM TO INSPECT</p>
</div>
</section>
</main>
</div>

<template id="movieItemTemplate">
<li class="movie-item" tabindex="0">
<div class="movie-thumb">
<img class="movie-thumb-img hidden" alt="Movie poster" />
<div class="movie-thumb-fallback">🎬</div>
</div>

<div class="movie-meta">
<h3 class="movie-name"></h3>

<div class="movie-submeta">
<span class="year">N/A</span>
<span class="rating">⭐ N/A</span>
</div>
</div>
</li>
</template>

<script src="connection.js"></script>
<script src="script.js"></script>
</body>
</html>
